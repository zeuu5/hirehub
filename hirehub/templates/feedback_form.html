<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Feedback Form Container */
        .feedback-container {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #333;
        }

        /* Message Styles (Success and Error Messages) */
        .message {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }

        .message.success {
            background-color: #ffffff;
            color: #155724;
        
        }

        .message.error {
            background-color: #ffffff;
            color: #721c24;
        
        }

        /* Form Grouping */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-align: left;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fff;
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ff523b;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Submit Button Styling */
        button {
            width: 100%;
            padding: 12px;
            background: #ff523b;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #e14a3b;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- Feedback Form Container -->
    <div class="feedback-container">
        <h2>Feedback Form</h2>

        <!-- Display success or error messages -->
        {% if messages %}
            <div>
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="your_feedback">Your Feedback:</label>
                <textarea id="your_feedback" name="your_feedback" rows="4" required></textarea>
            </div>
            
            <button type="submit">Submit Feedback</button>
        </form>
    </div>

</body>
</html>




{% endblock content %}
